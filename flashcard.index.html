<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Flashcards</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  color: #1a1a2e;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== MAIN MENU ===== */
#menuScreen {
  padding-top: 32px;
}

.menu-title {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: #1a1a2e;
}

.menu-subtitle {
  text-align: center;
  font-size: 0.9rem;
  color: #666;
  margin-bottom: 32px;
}

.level-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 32px;
}

.level-btn {
  background: #fff;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  padding: 24px 16px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}

.level-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
}

.level-btn:active { transform: translateY(0); }

.level-btn.lv-A1 { border-top: 5px solid #2d6a4f; }
.level-btn.lv-A2 { border-top: 5px solid #1a6b8a; }
.level-btn.lv-B1 { border-top: 5px solid #b5620d; }
.level-btn.lv-B2 { border-top: 5px solid #6b3a9e; }

.level-name {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 4px;
}

.lv-A1 .level-name { color: #2d6a4f; }
.lv-A2 .level-name { color: #1a6b8a; }
.lv-B1 .level-name { color: #b5620d; }
.lv-B2 .level-name { color: #6b3a9e; }

.level-count {
  font-size: 0.85rem;
  color: #555;
}

.level-checked {
  font-size: 0.8rem;
  color: #e6a817;
  margin-top: 4px;
}

/* ===== CARD SCREEN ===== */
#cardScreen {
  padding-top: 8px;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.back-btn {
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.1s;
  min-height: 44px;
}
.back-btn:hover { background: #f5f5f5; }

.level-badge {
  font-size: 1rem;
  font-weight: 700;
  padding: 6px 14px;
  border-radius: 20px;
  color: #fff;
}
.badge-A1 { background: #2d6a4f; }
.badge-A2 { background: #1a6b8a; }
.badge-B1 { background: #b5620d; }
.badge-B2 { background: #6b3a9e; }

/* Controls */
.controls-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.ctrl-btn {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1.5px solid #ccc;
  background: #fff;
  font-size: 0.85rem;
  cursor: pointer;
  min-height: 36px;
  transition: background 0.1s;
}
.ctrl-btn:hover { background: #f0f0f0; }
.ctrl-btn.active {
  background: #1a1a2e;
  color: #fff;
  border-color: #1a1a2e;
}
.ctrl-btn.danger {
  border-color: #d32f2f;
  color: #d32f2f;
}
.ctrl-btn.danger:hover { background: #fff0f0; }

.filter-select {
  padding: 7px 10px;
  border-radius: 8px;
  border: 1.5px solid #ccc;
  background: #fff;
  font-size: 0.85rem;
  cursor: pointer;
  min-height: 36px;
}

/* Score bar */
.score-bar-wrap {
  margin-bottom: 10px;
}
.score-bar-bg {
  height: 8px;
  background: #e0e0e0;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 4px;
}
.score-bar-fill {
  height: 100%;
  background: #4caf50;
  border-radius: 4px;
  transition: width 0.3s;
  width: 0%;
}
.score-text {
  font-size: 0.8rem;
  color: #555;
}

/* Card action buttons */
.card-actions-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.remaining-text {
  font-size: 0.85rem;
  color: #555;
  flex: 1;
}

.action-btn {
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  width: 40px;
  height: 40px;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
  min-height: 44px;
  min-width: 44px;
}
.action-btn:hover { background: #f0f0f0; }
.action-btn.checked { background: #fff3cd; border-color: #e6a817; }

/* Card flip */
.card-scene {
  perspective: 1000px;
  height: 360px;
  cursor: pointer;
  margin-bottom: 12px;
  user-select: none;
}

.card-obj {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}

.card-obj.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  overflow: hidden;
}

.card-front {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
}

.card-back {
  transform: rotateY(180deg);
  padding: 20px 20px 16px;
  overflow-y: auto;
}

.front-ja {
  font-size: 1.3rem;
  line-height: 1.7;
  color: #1a1a2e;
  margin-bottom: 24px;
  font-weight: 500;
}

.front-hint {
  font-size: 0.82rem;
  color: #aaa;
}

.back-en {
  font-size: 1.6rem;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 6px;
  line-height: 1.3;
}

.pos-badge {
  display: inline-block;
  font-size: 0.75rem;
  padding: 2px 10px;
  border-radius: 12px;
  background: #e8eaf6;
  color: #3949ab;
  margin-bottom: 16px;
  font-weight: 600;
}

.example-block {
  margin-bottom: 12px;
  padding: 10px 12px;
  background: #f8f9fa;
  border-radius: 8px;
  border-left: 3px solid #ddd;
}

.example-en {
  font-size: 0.88rem;
  font-style: italic;
  color: #333;
  line-height: 1.5;
  margin-bottom: 3px;
}

.example-ja {
  font-size: 0.82rem;
  color: #666;
  line-height: 1.5;
}

/* Navigation */
.nav-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  justify-content: center;
}

.nav-btn {
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 50%;
  width: 48px;
  height: 48px;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}
.nav-btn:hover { background: #f0f0f0; }

.page-indicator {
  font-size: 0.95rem;
  color: #555;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid transparent;
  min-width: 90px;
  text-align: center;
}
.page-indicator:hover { border-color: #ccc; background: #fff; }

.page-input {
  width: 80px;
  font-size: 0.95rem;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1.5px solid #999;
  text-align: center;
  display: none;
}
.page-input.visible { display: block; }

/* Result buttons */
.result-row {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
}

.result-btn {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  min-height: 48px;
}
.result-btn:hover { opacity: 0.87; }
.result-btn:active { transform: scale(0.97); }

.btn-ok { background: #4caf50; color: #fff; }
.btn-ng { background: #f44336; color: #fff; }

/* Edit panel */
.edit-panel {
  display: none;
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  margin-bottom: 12px;
}
.edit-panel.visible { display: block; }

.edit-panel h3 {
  font-size: 1rem;
  margin-bottom: 14px;
  color: #333;
}

.edit-field {
  margin-bottom: 12px;
}

.edit-field label {
  display: block;
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 4px;
  font-weight: 600;
}

.edit-field textarea {
  width: 100%;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
  min-height: 56px;
}
.edit-field textarea:focus { outline: none; border-color: #999; }

.edit-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.edit-btn {
  padding: 9px 20px;
  border-radius: 8px;
  border: 1.5px solid #ccc;
  font-size: 0.9rem;
  cursor: pointer;
  background: #fff;
}
.edit-btn.primary {
  background: #1a1a2e;
  color: #fff;
  border-color: #1a1a2e;
}
.edit-btn.primary:hover { background: #2a2a4e; }

/* Add card button */
.add-card-wrap {
  margin-top: 8px;
  margin-bottom: 16px;
  text-align: center;
}

.add-card-btn {
  border: 2px dashed #bbb;
  background: transparent;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 0.9rem;
  color: #777;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.add-card-btn:hover { border-color: #888; color: #444; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.visible { display: flex; }

.modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-box h3 {
  font-size: 1.1rem;
  margin-bottom: 16px;
}

.modal-field {
  margin-bottom: 14px;
}
.modal-field label {
  display: block;
  font-size: 0.8rem;
  color: #666;
  margin-bottom: 4px;
  font-weight: 600;
}
.modal-field input, .modal-field textarea {
  width: 100%;
  border: 1.5px solid #ccc;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 0.9rem;
  font-family: inherit;
}
.modal-field input:focus, .modal-field textarea:focus {
  outline: none; border-color: #999;
}

.modal-btns {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 16px;
}

.modal-btn {
  padding: 9px 20px;
  border-radius: 8px;
  border: 1.5px solid #ccc;
  font-size: 0.9rem;
  cursor: pointer;
  background: #fff;
}
.modal-btn.primary {
  background: #1a1a2e;
  color: #fff;
  border-color: #1a1a2e;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: #888;
  font-size: 0.95rem;
}

/* Responsive */
@media (max-width: 400px) {
  .level-buttons { grid-template-columns: 1fr 1fr; gap: 10px; }
  .level-btn { padding: 16px 10px; }
  .level-name { font-size: 1.6rem; }
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menuScreen" class="screen active">
  <div class="container">
    <div class="menu-title">Vocabulary Flashcards</div>
    <div class="menu-subtitle">レベルを選んで学習スタート</div>
    <div class="level-buttons">
      <button class="level-btn lv-A1" onclick="openLevel('A1')">
        <div class="level-name">A1</div>
        <div class="level-count" id="count-A1">— 枚</div>
        <div class="level-checked" id="checked-A1">★ 0</div>
      </button>
      <button class="level-btn lv-A2" onclick="openLevel('A2')">
        <div class="level-name">A2</div>
        <div class="level-count" id="count-A2">— 枚</div>
        <div class="level-checked" id="checked-A2">★ 0</div>
      </button>
      <button class="level-btn lv-B1" onclick="openLevel('B1')">
        <div class="level-name">B1</div>
        <div class="level-count" id="count-B1">— 枚</div>
        <div class="level-checked" id="checked-B1">★ 0</div>
      </button>
      <button class="level-btn lv-B2" onclick="openLevel('B2')">
        <div class="level-name">B2</div>
        <div class="level-count" id="count-B2">— 枚</div>
        <div class="level-checked" id="checked-B2">★ 0</div>
      </button>
    </div>
  </div>
</div>

<!-- CARD SCREEN -->
<div id="cardScreen" class="screen">
  <div class="container">
    <!-- Header -->
    <div class="card-header">
      <button class="back-btn" onclick="goToMenu()">← メニュー</button>
      <span class="level-badge" id="levelBadge">A1</span>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <button class="ctrl-btn active" id="btnOrder" onclick="setOrder('seq')">順番通り</button>
      <button class="ctrl-btn" id="btnShuffle" onclick="setOrder('shuffle')">シャッフル</button>
      <select class="filter-select" id="filterSelect" onchange="applyFilter()">
        <option value="all">全て</option>
        <option value="checked">★チェックのみ</option>
        <option value="ng">✗不正解のみ</option>
      </select>
      <button class="ctrl-btn danger" onclick="resetRecords()">記録リセット</button>
    </div>

    <!-- Score bar -->
    <div class="score-bar-wrap">
      <div class="score-bar-bg"><div class="score-bar-fill" id="scoreBarFill"></div></div>
      <div class="score-text" id="scoreText">正解: 0 / 0 (0%)</div>
    </div>

    <!-- Card action buttons -->
    <div class="card-actions-row">
      <span class="remaining-text" id="remainingText">残り: 0 枚</span>
      <button class="action-btn" id="speakBtn" onclick="speakWord()" title="発音 (S)">🔊</button>
      <button class="action-btn" id="checkBtn" onclick="toggleCheck()" title="チェック (C)">☆</button>
      <button class="action-btn" onclick="openEditPanel()" title="編集">✏️</button>
      <button class="action-btn" onclick="deleteCard()" title="削除">🗑️</button>
    </div>

    <!-- Edit panel (shown instead of card when editing) -->
    <div class="edit-panel" id="editPanel">
      <h3>✏️ カードを編集</h3>
      <div class="edit-field">
        <label>日本語 (表面)</label>
        <textarea id="edit-ja" rows="2"></textarea>
      </div>
      <div class="edit-field">
        <label>英語 (裏面)</label>
        <textarea id="edit-en" rows="2"></textarea>
      </div>
      <div class="edit-field">
        <label>例文1 (英語)</label>
        <textarea id="edit-ex1en" rows="2"></textarea>
      </div>
      <div class="edit-field">
        <label>例文1 (日本語)</label>
        <textarea id="edit-ex1ja" rows="2"></textarea>
      </div>
      <div class="edit-field">
        <label>例文2 (英語)</label>
        <textarea id="edit-ex2en" rows="2"></textarea>
      </div>
      <div class="edit-field">
        <label>例文2 (日本語)</label>
        <textarea id="edit-ex2ja" rows="2"></textarea>
      </div>
      <div class="edit-btns">
        <button class="edit-btn" onclick="closeEditPanel()">キャンセル</button>
        <button class="edit-btn primary" onclick="saveEdit()">保存</button>
      </div>
    </div>

    <!-- Card scene (hidden when edit panel is open) -->
    <div class="card-scene" id="cardScene" onclick="flipCard()">
      <div class="card-obj" id="cardObj">
        <div class="card-face card-front" id="cardFront">
          <div class="front-ja" id="frontJa"></div>
          <div class="front-hint">タップして英語を見る</div>
        </div>
        <div class="card-face card-back" id="cardBack">
          <div class="back-en" id="backEn"></div>
          <span class="pos-badge" id="posBadge"></span>
          <div id="examplesArea"></div>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      表示するカードがありません
    </div>

    <!-- Navigation -->
    <div class="nav-row">
      <button class="nav-btn" onclick="navigate(-1)">←</button>
      <span class="page-indicator" id="pageIndicator" onclick="startPageJump()">1 / 1</span>
      <input class="page-input" id="pageInput" type="number" min="1"
             onkeydown="pageInputKey(event)" onblur="confirmPageJump()">
      <button class="nav-btn" onclick="navigate(1)">→</button>
    </div>

    <!-- Result buttons -->
    <div class="result-row">
      <button class="result-btn btn-ok" onclick="recordResult('ok')">✓ 正解 (O)</button>
      <button class="result-btn btn-ng" onclick="recordResult('ng')">✗ 不正解 (X)</button>
    </div>

    <!-- Add card -->
    <div class="add-card-wrap">
      <button class="add-card-btn" onclick="openAddModal()">＋ カードを追加</button>
    </div>
  </div>
</div>

<!-- Add card modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal-box">
    <h3>＋ カードを追加</h3>
    <div class="modal-field">
      <label>日本語 (必須)</label>
      <input type="text" id="modal-ja" placeholder="例: 走る">
    </div>
    <div class="modal-field">
      <label>英語 (必須)</label>
      <input type="text" id="modal-en" placeholder="例: run">
    </div>
    <div class="modal-field">
      <label>例文 (英語, 任意)</label>
      <textarea id="modal-ex1en" rows="2" placeholder="例: She runs every morning."></textarea>
    </div>
    <div class="modal-field">
      <label>例文 (日本語, 任意)</label>
      <textarea id="modal-ex1ja" rows="2" placeholder="例: 彼女は毎朝走る。"></textarea>
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeAddModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="addCard()">追加</button>
    </div>
  </div>
</div>

// ===== STATE =====
let currentLevel = null;
let cards = [];         // active card list (filtered + ordered)
let baseCards = [];     // all cards for level (after edits/deletes/adds)
let idx = 0;
let isFlipped = false;
let orderMode = 'seq'; // 'seq' | 'shuffle'
let filterMode = 'all'; // 'all' | 'checked' | 'ng'
let editingIdx = null;

// ===== localStorage helpers =====
function lsGet(key, def) {
  try {
    const v = localStorage.getItem(key);
    return v !== null ? JSON.parse(v) : def;
  } catch(e) { return def; }
}
function lsSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function getEdits(lv)    { return lsGet(`vocab_edits_${lv}`, {}); }
function getDeleted(lv)  { return lsGet(`vocab_deleted_${lv}`, []); }
function getAdded(lv)    { return lsGet(`vocab_added_${lv}`, []); }
function getChecked()    { return lsGet('vocab_checked', {}); }
function getScores(lv)   { return lsGet(`vocab_scores_${lv}`, {}); }
function getLastPos(lv)  { return lsGet(`vocab_lastpos_${lv}`, 0); }

function saveLS(key, val) {
  lsSet(key, val);
  try { bc.postMessage('update'); } catch(e) {}
}

// ===== BroadcastChannel =====
let bc = null;
try {
  bc = new BroadcastChannel('vocab_sync');
  bc.onmessage = () => {
    updateMenuCounts();
    if (currentLevel) {
      const savedIdx = idx;
      rebuildBaseCards();
      rebuildCards();
      idx = Math.min(savedIdx, cards.length - 1);
      if (idx < 0) idx = 0;
      renderCard();
    }
  };
} catch(e) {
  bc = { postMessage: () => {} };
}

// ===== Build card lists =====
function buildBaseCards(lv) {
  const edits   = getEdits(lv);
  const deleted = getDeleted(lv);
  const added   = getAdded(lv);
  const deletedSet = new Set(deleted);

  const base = BASE_DATA[lv]
    .filter(c => !deletedSet.has(c.id))
    .map(c => {
      if (edits[c.id]) {
        return Object.assign({}, c, edits[c.id]);
      }
      return Object.assign({}, c);
    });

  return base.concat(added);
}

function rebuildBaseCards() {
  baseCards = buildBaseCards(currentLevel);
}

function rebuildCards() {
  const checked = getChecked();
  const scores  = getScores(currentLevel);

  let filtered = baseCards.slice();

  if (filterMode === 'checked') {
    filtered = filtered.filter(c => checked[c.id]);
  } else if (filterMode === 'ng') {
    filtered = filtered.filter(c => scores[c.id] === 'ng');
  }

  if (orderMode === 'shuffle') {
    // Fisher-Yates
    for (let i = filtered.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
    }
  }

  cards = filtered;
}

// ===== Menu =====
function updateMenuCounts() {
  const checked = getChecked();
  ['A1','A2','B1','B2'].forEach(lv => {
    const bc2 = buildBaseCards(lv);
    const total = bc2.length;
    const chk = bc2.filter(c => checked[c.id]).length;
    document.getElementById(`count-${lv}`).textContent = `${total} 枚`;
    document.getElementById(`checked-${lv}`).textContent = `★ ${chk}`;
  });
}

// ===== Open level =====
function openLevel(lv) {
  currentLevel = lv;
  orderMode = 'seq';
  filterMode = 'all';
  isFlipped = false;

  document.getElementById('btnOrder').classList.add('active');
  document.getElementById('btnShuffle').classList.remove('active');
  document.getElementById('filterSelect').value = 'all';

  rebuildBaseCards();
  rebuildCards();

  // Restore last position
  let savedPos = getLastPos(lv);
  idx = Math.min(savedPos, Math.max(0, cards.length - 1));

  // Update badge
  const badge = document.getElementById('levelBadge');
  badge.textContent = lv;
  badge.className = `level-badge badge-${lv}`;

  showScreen('cardScreen');
  closeEditPanel();
  renderCard();
}

// ===== Go to menu =====
function goToMenu() {
  if (currentLevel) {
    saveLS(`vocab_lastpos_${currentLevel}`, idx);
  }
  closeEditPanel();
  showScreen('menuScreen');
  updateMenuCounts();
  currentLevel = null;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Render =====
function renderCard() {
  const scene    = document.getElementById('cardScene');
  const emptyDiv = document.getElementById('emptyState');

  if (cards.length === 0) {
    scene.style.display = 'none';
    emptyDiv.style.display = 'block';
    document.getElementById('pageIndicator').textContent = '0 / 0';
    document.getElementById('remainingText').textContent = '残り: 0 枚';
    updateScoreBar();
    return;
  }

  scene.style.display = '';
  emptyDiv.style.display = 'none';

  // Reset flip
  isFlipped = false;
  document.getElementById('cardObj').classList.remove('flipped');

  const card = cards[idx];

  // Front
  document.getElementById('frontJa').textContent = card.ja || '(翻訳なし)';

  // Back
  document.getElementById('backEn').textContent = card.en || '(英語なし)';

  const pos = card.pos;
  const posBadge = document.getElementById('posBadge');
  if (pos) {
    posBadge.textContent = pos;
    posBadge.style.display = '';
  } else {
    posBadge.style.display = 'none';
  }

  // Examples
  const exArea = document.getElementById('examplesArea');
  exArea.innerHTML = '';
  if (card.ex1_en || card.ex1_ja) {
    const b = document.createElement('div');
    b.className = 'example-block';
    if (card.ex1_en) {
      const e = document.createElement('div');
      e.className = 'example-en';
      e.textContent = card.ex1_en;
      b.appendChild(e);
    }
    if (card.ex1_ja) {
      const j = document.createElement('div');
      j.className = 'example-ja';
      j.textContent = card.ex1_ja;
      b.appendChild(j);
    }
    exArea.appendChild(b);
  }
  if (card.ex2_en || card.ex2_ja) {
    const b = document.createElement('div');
    b.className = 'example-block';
    if (card.ex2_en) {
      const e = document.createElement('div');
      e.className = 'example-en';
      e.textContent = card.ex2_en;
      b.appendChild(e);
    }
    if (card.ex2_ja) {
      const j = document.createElement('div');
      j.className = 'example-ja';
      j.textContent = card.ex2_ja;
      b.appendChild(j);
    }
    exArea.appendChild(b);
  }

  // Page indicator
  document.getElementById('pageIndicator').textContent = `${idx + 1} / ${cards.length}`;
  document.getElementById('remainingText').textContent = `残り: ${cards.length - idx} 枚`;

  // Check button
  const checked = getChecked();
  const checkBtn = document.getElementById('checkBtn');
  if (checked[card.id]) {
    checkBtn.textContent = '★';
    checkBtn.classList.add('checked');
  } else {
    checkBtn.textContent = '☆';
    checkBtn.classList.remove('checked');
  }

  updateScoreBar();
}

function updateScoreBar() {
  const scores = getScores(currentLevel);
  const keys = Object.keys(scores);
  const okCount = keys.filter(k => scores[k] === 'ok').length;
  const total = keys.length;
  const pct = total > 0 ? Math.round(okCount / total * 100) : 0;
  document.getElementById('scoreBarFill').style.width = pct + '%';
  document.getElementById('scoreText').textContent = `正解: ${okCount} / ${total} (${pct}%)`;
}

// ===== Flip =====
function flipCard() {
  if (cards.length === 0) return;
  isFlipped = !isFlipped;
  document.getElementById('cardObj').classList.toggle('flipped', isFlipped);
}

// ===== Navigate =====
function navigate(dir) {
  if (cards.length === 0) return;
  idx = ((idx + dir) + cards.length) % cards.length;
  isFlipped = false;
  closeEditPanel();
  renderCard();
}

// ===== Page jump =====
function startPageJump() {
  const ind = document.getElementById('pageIndicator');
  const inp = document.getElementById('pageInput');
  ind.style.display = 'none';
  inp.classList.add('visible');
  inp.value = idx + 1;
  inp.max = cards.length;
  inp.focus();
  inp.select();
}

function pageInputKey(e) {
  if (e.key === 'Enter') {
    confirmPageJump();
  } else if (e.key === 'Escape') {
    cancelPageJump();
  }
}

function confirmPageJump() {
  const inp = document.getElementById('pageInput');
  const v = parseInt(inp.value, 10);
  if (!isNaN(v) && v >= 1 && v <= cards.length) {
    idx = v - 1;
    renderCard();
  }
  cancelPageJump();
}

function cancelPageJump() {
  document.getElementById('pageIndicator').style.display = '';
  const inp = document.getElementById('pageInput');
  inp.classList.remove('visible');
}

// ===== Order / Filter =====
function setOrder(mode) {
  orderMode = mode;
  document.getElementById('btnOrder').classList.toggle('active', mode === 'seq');
  document.getElementById('btnShuffle').classList.toggle('active', mode === 'shuffle');
  const savedId = cards[idx] ? cards[idx].id : null;
  rebuildCards();
  // Try to keep same card
  if (savedId) {
    const newIdx = cards.findIndex(c => c.id === savedId);
    idx = newIdx >= 0 ? newIdx : 0;
  } else {
    idx = 0;
  }
  renderCard();
}

function applyFilter() {
  filterMode = document.getElementById('filterSelect').value;
  rebuildCards();
  idx = 0;
  renderCard();
}

// ===== Reset records =====
function resetRecords() {
  if (!confirm('このレベルの記録（正解/不正解）をリセットしますか？')) return;
  saveLS(`vocab_scores_${currentLevel}`, {});
  updateScoreBar();
}

// ===== Speak =====
function speakWord() {
  if (cards.length === 0) return;
  const text = cards[idx].en;
  if (!text) return;
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.9;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// ===== Check toggle =====
function toggleCheck() {
  if (cards.length === 0) return;
  const card = cards[idx];
  const checked = getChecked();
  if (checked[card.id]) {
    delete checked[card.id];
  } else {
    checked[card.id] = true;
  }
  saveLS('vocab_checked', checked);
  renderCard();
  updateMenuCounts();
}

// ===== Record result =====
function recordResult(result) {
  if (cards.length === 0) return;
  const card = cards[idx];
  const scores = getScores(currentLevel);
  scores[card.id] = result;
  saveLS(`vocab_scores_${currentLevel}`, scores);

  // If filter is 'ng' and result is 'ok', rebuild
  if (filterMode === 'ng' && result === 'ok') {
    const nextId = cards[idx + 1] ? cards[idx + 1].id : null;
    rebuildCards();
    if (nextId) {
      const ni = cards.findIndex(c => c.id === nextId);
      idx = ni >= 0 ? ni : Math.min(idx, cards.length - 1);
    } else {
      idx = Math.min(idx, cards.length - 1);
    }
    if (idx < 0) idx = 0;
  } else {
    // advance
    if (idx < cards.length - 1) {
      idx++;
    }
  }

  isFlipped = false;
  closeEditPanel();
  renderCard();
}

// ===== Edit panel =====
function openEditPanel() {
  if (cards.length === 0) return;
  const card = cards[idx];
  editingIdx = idx;

  document.getElementById('edit-ja').value    = card.ja || '';
  document.getElementById('edit-en').value    = card.en || '';
  document.getElementById('edit-ex1en').value = card.ex1_en || '';
  document.getElementById('edit-ex1ja').value = card.ex1_ja || '';
  document.getElementById('edit-ex2en').value = card.ex2_en || '';
  document.getElementById('edit-ex2ja').value = card.ex2_ja || '';

  document.getElementById('editPanel').classList.add('visible');
  document.getElementById('cardScene').style.display = 'none';
}

function closeEditPanel() {
  document.getElementById('editPanel').classList.remove('visible');
  document.getElementById('cardScene').style.display = '';
  editingIdx = null;
}

function saveEdit() {
  if (editingIdx === null || editingIdx >= cards.length) return;
  const card = cards[editingIdx];

  const updated = {
    ja:     document.getElementById('edit-ja').value.trim(),
    en:     document.getElementById('edit-en').value.trim(),
    ex1_en: document.getElementById('edit-ex1en').value.trim(),
    ex1_ja: document.getElementById('edit-ex1ja').value.trim(),
    ex2_en: document.getElementById('edit-ex2en').value.trim(),
    ex2_ja: document.getElementById('edit-ex2ja').value.trim(),
  };

  // Update in-place
  Object.assign(cards[editingIdx], updated);

  // For base cards that are in BASE_DATA (not added): persist as edit
  const isAdded = String(card.id).startsWith('added_');
  if (isAdded) {
    const added = getAdded(currentLevel);
    const ai = added.findIndex(c => c.id === card.id);
    if (ai >= 0) Object.assign(added[ai], updated);
    saveLS(`vocab_added_${currentLevel}`, added);
  } else {
    const edits = getEdits(currentLevel);
    edits[card.id] = updated;
    saveLS(`vocab_edits_${currentLevel}`, edits);
  }

  // Also update baseCards
  const bi = baseCards.findIndex(c => c.id === card.id);
  if (bi >= 0) Object.assign(baseCards[bi], updated);

  const stayIdx = editingIdx;
  closeEditPanel();
  idx = stayIdx;
  renderCard();
}

// ===== Delete =====
function deleteCard() {
  if (cards.length === 0) return;
  const card = cards[idx];
  if (!confirm(`「${card.en}」を削除しますか？`)) return;

  const isAdded = String(card.id).startsWith('added_');
  if (isAdded) {
    const added = getAdded(currentLevel).filter(c => c.id !== card.id);
    saveLS(`vocab_added_${currentLevel}`, added);
  } else {
    const deleted = getDeleted(currentLevel);
    deleted.push(card.id);
    saveLS(`vocab_deleted_${currentLevel}`, deleted);
  }

  rebuildBaseCards();
  rebuildCards();

  if (idx >= cards.length) idx = Math.max(0, cards.length - 1);
  closeEditPanel();
  renderCard();
  updateMenuCounts();
}

// ===== Add card modal =====
function openAddModal() {
  document.getElementById('modal-ja').value    = '';
  document.getElementById('modal-en').value    = '';
  document.getElementById('modal-ex1en').value = '';
  document.getElementById('modal-ex1ja').value = '';
  document.getElementById('addModal').classList.add('visible');
  document.getElementById('modal-ja').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('visible');
}

function addCard() {
  const ja    = document.getElementById('modal-ja').value.trim();
  const en    = document.getElementById('modal-en').value.trim();
  const ex1en = document.getElementById('modal-ex1en').value.trim();
  const ex1ja = document.getElementById('modal-ex1ja').value.trim();

  if (!ja || !en) {
    alert('日本語と英語は必須です。');
    return;
  }

  const newId = `added_${currentLevel}_${Date.now()}`;
  const newCard = {
    id: newId,
    ja, en,
    pos: '',
    ex1_en: ex1en,
    ex1_ja: ex1ja,
    ex2_en: '',
    ex2_ja: '',
  };

  const added = getAdded(currentLevel);
  added.push(newCard);
  saveLS(`vocab_added_${currentLevel}`, added);

  rebuildBaseCards();
  rebuildCards();

  // navigate to new card
  const ni = cards.findIndex(c => c.id === newId);
  idx = ni >= 0 ? ni : cards.length - 1;

  closeAddModal();
  renderCard();
  updateMenuCounts();
}

// ===== Keyboard =====
document.addEventListener('keydown', e => {
  // Don't fire when typing in input/textarea
  const tag = document.activeElement.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

  // Don't fire on menu screen
  if (!currentLevel) return;

  // Don't fire if edit panel is open (except Escape)
  const editOpen = document.getElementById('editPanel').classList.contains('visible');
  if (editOpen && e.key !== 'Escape') return;

  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); navigate(-1); break;
    case 'ArrowRight': e.preventDefault(); navigate(1);  break;
    case ' ':
    case 'Enter':      e.preventDefault(); flipCard();   break;
    case 'o':
    case 'O':          e.preventDefault(); recordResult('ok'); break;
    case 'x':
    case 'X':          e.preventDefault(); recordResult('ng'); break;
    case 'c':
    case 'C':          e.preventDefault(); toggleCheck(); break;
    case 's':
    case 'S':          e.preventDefault(); speakWord();  break;
    case 'Escape':
      if (editOpen) closeEditPanel();
      if (document.getElementById('addModal').classList.contains('visible')) closeAddModal();
      break;
  }
});

// ===== Init =====
updateMenuCounts();
</script>
